services:
  kylinguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kylinguard
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      KG_DB_PATH: /app/data/kylinguard.db
      KG_WORKSPACE_ROOT: /workspace
    volumes:
      - kylinguard-data:/app/data
      - kylinguard-workspace:/workspace
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 1g
    cpus: 2.0
    restart: unless-stopped

volumes:
  kylinguard-data:
  kylinguard-workspace:
