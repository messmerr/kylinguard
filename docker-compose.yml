services:
  kylinguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kylinguard
    ports:
      # 控制面无远程认证，默认只能从宿主机本地访问。
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      KG_DB_PATH: /app/data/kylinguard.db
      KG_LLM_SECRETS_DIR: /app/data/provider-secrets
      KG_MCP_SECRETS_DIR: /app/data/mcp-secrets
      KG_SKILLS_DIR: /app/data/skills
      KG_SKILLS_STATE_PATH: /app/data/skills-state.json
      KG_WORKSPACE_ROOT: /workspace
    volumes:
      - kylinguard-data:/app/data
      - kylinguard-workspace:/workspace
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 1g
    cpus: 2.0
    restart: unless-stopped

volumes:
  kylinguard-data:
  kylinguard-workspace:
